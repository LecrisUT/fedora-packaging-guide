version = 1

[[annotations]]
path = [
	".github/workflows/*",
	".github/renovate.json",
	".gitignore",
	".pre-commit-config.yaml",
	".readthedocs.yaml",
	"README.md",
	"docs/*.md",
	"docs/images/**",
	"docs/conf.py",
]
SPDX-FileCopyrightText = "2025 Cristian Le <fedora@lecris.me>"
SPDX-License-Identifier = "CC-BY-SA-4.0"

# Generated files or trivial files un copyrighted
# https://codeberg.org/fsfe/reuse-tool/issues/1312
[[annotations]]
path = [
	"uv.lock",
	"pylock.toml",
]
precedence = "override"
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "CC0-1.0"

# Downstream spec files do not have clear copyright/license
[[annotations]]
path = [
	"docs/**/*.spec",
]
precedence = "override"
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "CC0-1.0"
